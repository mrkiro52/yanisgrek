events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name yanisgrek.ru www.yanisgrek.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name yanisgrek.ru;

        ssl_certificate /etc/letsencrypt/live/yanisgrek.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yanisgrek.ru/privkey.pem;

        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        location / {
            # Меняем proxy_pass на serve статики из контейнера app
            proxy_pass http://app:80;  # Было 3000, стало 80
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name www.yanisgrek.ru;

        ssl_certificate /etc/letsencrypt/live/yanisgrek.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yanisgrek.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        return 301 https://yanisgrek.ru$request_uri;
    }
}
