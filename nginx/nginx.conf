events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name yanisgrek.ru www.yanisgrek.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name yanisgrek.ru;

        ssl_certificate /etc/letsencrypt/live/yanisgrek.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yanisgrek.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        root /usr/share/nginx/html;
        index index.html;
        
        location / {
            try_files $uri $uri.html $uri/ =404;
        }
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    server {
        listen 443 ssl;
        server_name www.yanisgrek.ru;

        ssl_certificate /etc/letsencrypt/live/yanisgrek.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yanisgrek.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        return 301 https://yanisgrek.ru$request_uri;
    }
}
