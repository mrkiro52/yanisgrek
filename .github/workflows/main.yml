name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create archive
        run: |
          mkdir -p deploy
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='deploy' ./ deploy/
          tar -czf code.tar.gz -C deploy .
          rm -rf deploy
          
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          scp -o StrictHostKeyChecking=no code.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/yanisgrek-main/
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ~/yanisgrek-main
            tar -xzf code.tar.gz
            rm code.tar.gz
            
            # Останавливаем старое
            docker compose down -v 2>/dev/null || true
            
            # Собираем и запускаем
            docker compose up -d --build
            
            # ВСЯ ПРОВЕРКА - просто смотрим что контейнеры запустились
            sleep 5
            docker compose ps
            
            echo "✅ Деплой завершён"
          EOF
